<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'ja' }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{ page.title | default: site.title }}</title>
    {% if page.lang == 'en' %}
      {% assign meta_desc = page.description | default: site.description_en %}
    {% else %}
      {% assign meta_desc = page.description | default: site.description %}
    {% endif %}
    <meta name="description" content="{{ meta_desc | escape }}" />
    <meta property="og:description" content="{{ meta_desc | escape }}" />
    <meta name="twitter:description" content="{{ meta_desc | escape }}" />
    <!-- Favicons / PWA -->
    <link rel="icon" href="{{ '/assets/images/favicon.ico' | relative_url }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/images/apple-touch-icon.png' | relative_url }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/images/favicon-32x32.png' | relative_url }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/images/favicon-16x16.png' | relative_url }}">
    <link rel="manifest" href="{{ '/site.webmanifest' | relative_url }}">
    <meta name="theme-color" content="#0b3d91">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    {% include header.html %}

    <main class="site-main">
      <div class="container">
        {{ content }}
      </div>
    </main>

    {% include footer.html %}
    {% include cookie-consent.html %}
  </body>
</html>
