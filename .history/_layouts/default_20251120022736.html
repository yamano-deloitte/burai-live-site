<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'ja' }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{ page.title | default: site.title }}</title>
    {% if page.lang == 'en' %}
      {% assign meta_desc = page.description | default: site.description_en %}
    {% else %}
      {% assign meta_desc = page.description | default: site.description %}
    {% endif %}
    <meta name="description" content="{{ meta_desc | escape }}" />
    <meta property="og:description" content="{{ meta_desc | escape }}" />
    <meta name="twitter:description" content="{{ meta_desc | escape }}" />
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    {% include header.html %}

    <main class="site-main">
      <div class="container">
        {{ content }}
      </div>
    </main>

    {% include footer.html %}
  </body>
</html>
