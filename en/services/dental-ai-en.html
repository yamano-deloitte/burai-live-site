<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dental AI Platform | Burai Live</title>
  <meta name="description" content="Burai Live Dental AI Platform. AI-powered phone booking and intercom systems for modern dental clinics. HIPAA-compliant, multilingual, EHR-integrated.">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; color: #0b1f3a; background: #f8f9fb; }
    button { font-family: inherit; border: 1px solid #d0d8e4; background: transparent; border-radius: 8px; cursor: pointer; transition: all 0.15s; }
    button:hover:not(:disabled) { background: #eef4fb; border-color: #007acc; color: #007acc; }
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }
  </style>
</head>
<body>
  <div id="dental-root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
  <script type="text/babel" data-presets="react">
    const { useState } = React;

    const teal = "#0b3d91";
    const teal2 = "#007acc";
    const tealLight = "#eef4fb";
    const tealMid = "#a8cef0";
    const blue = "#005fa3";

    const PHONE_FLOW = [
      { id: 1, icon: "ti-phone-incoming", label: "Incoming Call", desc: "Patient call is received", color: teal },
      { id: 2, icon: "ti-robot", label: "AI Recognition", desc: "Natural language conversation & intent detection", color: blue },
      { id: 3, icon: "ti-calendar-check", label: "Availability", desc: "Real-time appointment slot search", color: teal2 },
      { id: 4, icon: "ti-database", label: "Booking", desc: "Auto-sync with electronic health record", color: teal },
      { id: 5, icon: "ti-message-check", label: "SMS Reminder", desc: "Automated confirmation sent to patient", color: teal },
    ];

    const INTERCOM_FLOW = [
      { id: 1, icon: "ti-microphone", label: "Voice Input", desc: "Staff speaks via clinic intercom", color: teal },
      { id: 2, icon: "ti-brain", label: "AI Analysis", desc: "Context understanding & classification", color: blue },
      { id: 3, icon: "ti-list-check", label: "Task Convert", desc: "Voice command converted to task", color: teal2 },
      { id: 4, icon: "ti-users", label: "Staff Dispatch", desc: "Real-time delivery to assigned staff", color: teal },
      { id: 5, icon: "ti-chart-bar", label: "Log & Insights", desc: "Workflow logging & improvement tips", color: teal },
    ];

    const PHONE_FEATURES = [
      { icon: "ti-clock-24", title: "24/7 Availability", desc: "Accepts bookings overnight and on holidays — zero missed calls." },
      { icon: "ti-language", title: "Multilingual Support", desc: "Handles English, Japanese, Chinese, Korean, and more automatically." },
      { icon: "ti-heartbeat", title: "Symptom Triage", desc: "Assesses pain type and urgency, then suggests the right appointment slot.", addon: true },
      { icon: "ti-refresh", title: "Cancel & Reschedule", desc: "Existing appointments can be changed or cancelled by voice, instantly." },
      { icon: "ti-shield-check", title: "Privacy Compliant", desc: "Encrypted calls, HIPAA-aligned data handling, and local storage options." },
      { icon: "ti-chart-dots", title: "Analytics Dashboard", desc: "Live view of call volume, booking conversion rate, and peak hours." },
    ];

    const INTERCOM_FEATURES = [
      { icon: "ti-bolt", title: "Hands-Free Operation", desc: "Record notes and issue instructions by voice even with gloves on." },
      { icon: "ti-stethoscope", title: "Dental Terminology", desc: "High-accuracy recognition of procedure codes and clinical vocabulary." },
      { icon: "ti-arrows-sort", title: "Priority Sorting", desc: "Urgent requests are automatically escalated to the top of the queue." },
      { icon: "ti-clipboard-text", title: "Auto Chart Entry", desc: "Voice memos are formatted into SOAP notes and written to the EHR.", addon: true },
      { icon: "ti-speakerphone", title: "Noise Cancellation", desc: "Filters out turbines, suction, and HVAC — captures voice only." },
      { icon: "ti-lock", title: "Secure Channel", desc: "On-premises network design — audio data never leaves the clinic." },
    ];

    function FlowDiagram({ steps }) {
      const [active, setActive] = useState(null);
      return (
        <div style={{ display: "flex", alignItems: "flex-start", gap: 0, flexWrap: "wrap", justifyContent: "center", padding: "1.5rem 0 1rem" }}>
          {steps.map((step, i) => (
            <div key={step.id} style={{ display: "flex", alignItems: "center" }}>
              <div onClick={() => setActive(active === step.id ? null : step.id)}
                style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 8, cursor: "pointer" }}>
                <div style={{
                  width: 56, height: 56, borderRadius: "50%",
                  background: active === step.id ? step.color : tealLight,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  border: "2px solid " + (active === step.id ? step.color : tealMid),
                  transition: "all 0.2s",
                }}>
                  <i className={"ti " + step.icon} style={{ fontSize: 22, color: active === step.id ? "#fff" : step.color }} />
                </div>
                <div style={{ textAlign: "center", width: 80 }}>
                  <div style={{ fontSize: 11, fontWeight: 500, color: active === step.id ? step.color : "#1a1a1a", lineHeight: 1.3 }}>{step.label}</div>
                  {active === step.id && (
                    <div style={{ fontSize: 10, color: "#888", marginTop: 4, lineHeight: 1.4, animation: "fadeSlideIn 0.15s ease" }}>{step.desc}</div>
                  )}
                </div>
              </div>
              {i < steps.length - 1 && (
                <div style={{ width: 24, height: 2, background: tealMid, margin: "0 4px", marginBottom: 16, opacity: 0.6, flexShrink: 0 }} />
              )}
            </div>
          ))}
        </div>
      );
    }

    function FeatureGrid({ features }) {
      return (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 12, marginTop: "1rem" }}>
          {features.map((f, i) => (
            <div key={i} style={{ background: "#fff", border: f.addon ? "1px solid #f9a825" : "1px solid #e2e8f0", borderRadius: 12, padding: "1rem 1.25rem", boxShadow: "0 2px 8px rgba(11,61,145,0.04)", position: "relative" }}>
              {f.addon && (
                <span style={{
                  position: "absolute", top: -10, right: 10,
                  fontSize: 10, fontWeight: 700, padding: "2px 8px",
                  background: "#fff8e1", color: "#b45309",
                  border: "1px solid #f9a825", borderRadius: 100,
                  letterSpacing: "0.05em"
                }}>+ Add-on</span>
              )}
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                <div style={{ width: 32, height: 32, borderRadius: 8, background: f.addon ? "#fff8e1" : tealLight, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  <i className={"ti " + f.icon} style={{ fontSize: 16, color: f.addon ? "#b45309" : teal }} />
                </div>
                <span style={{ fontSize: 13, fontWeight: 500, lineHeight: 1.3 }}>{f.title}</span>
              </div>
              <p style={{ fontSize: 12, color: "#666", margin: 0, lineHeight: 1.6 }}>{f.desc}</p>
            </div>
          ))}
        </div>
      );
    }

    function PhoneDemo() {
      const conversation = [
        { role: "ai",   text: "Thank you for calling Sakura Dental Clinic. This is our AI receptionist — how can I help you today?" },
        { role: "user", text: "Hi, I've been having some tooth pain and I'd also like to schedule a routine check-up next week." },
        { role: "ai",   text: "I'm sorry to hear about the pain — let's get you seen as soon as possible. Next week I have Tuesday at 10:00 AM and Thursday at 2:30 PM available. Which works better for you?" },
        { role: "user", text: "Thursday at 2:30 PM, please." },
        { role: "ai",   text: "Thursday at 2:30 PM is confirmed. I'll send a confirmation SMS shortly. We look forward to seeing you — please take care!" },
      ];
      const [visible, setVisible] = React.useState(0);
      const [typing, setTyping]   = React.useState(false);

      React.useEffect(() => {
        if (visible >= conversation.length) return;
        setTyping(true);
        const delay = conversation[visible].role === "ai" ? 1200 : 800;
        const t = setTimeout(() => {
          setTyping(false);
          setTimeout(() => setVisible(v => v + 1), 300);
        }, delay);
        return () => clearTimeout(t);
      }, [visible]);

      return (
        <div style={{ background: "#f0f4f8", borderRadius: 12, padding: "1rem 1.25rem", marginTop: "1rem", border: "1px solid #e2e8f0" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#25d366" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.15 12 19.79 19.79 0 0 1 1.07 3.4 2 2 0 0 1 3.07 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
            <span style={{ fontSize: 12, color: "#555", fontWeight: 500 }}>Call demo — auto play</span>
            <span style={{ fontSize: 12, color: "#888" }}>·</span>
            <span style={{ fontSize: 12, fontWeight: 700, color: "#0b3d91" }}>Sakura Dental Clinic🌸</span>
            <span style={{
              marginLeft: "auto", fontSize: 10, fontWeight: 600,
              padding: "2px 8px", borderRadius: 100,
              background: visible < conversation.length ? "#eaf6ee" : "#eef4fb",
              color: visible < conversation.length ? "#1a7a3a" : "#0b3d91"
            }}>
              {visible < conversation.length ? "● On Call" : "✓ Complete"}
            </span>
          </div>

          <div style={{ display: "flex", flexDirection: "column", gap: 10, minHeight: 220 }}>
            {conversation.slice(0, visible).map((msg, i) => (
              <div key={i} style={{ display: "flex", justifyContent: msg.role === "ai" ? "flex-start" : "flex-end", animation: "fadeSlideIn 0.3s ease" }}>
                <div style={{
                  maxWidth: "80%", padding: "9px 13px", borderRadius: 14, fontSize: 13, lineHeight: 1.55,
                  background: msg.role === "ai" ? "#fff" : teal,
                  color: msg.role === "ai" ? "#1a1a1a" : "#fff",
                  boxShadow: "0 1px 6px rgba(0,0,0,0.06)",
                  borderBottomLeftRadius: msg.role === "ai" ? 4 : 14,
                  borderBottomRightRadius: msg.role === "user" ? 4 : 14,
                }}>
                  {msg.role === "ai" && (
                    <span style={{ fontSize: 10, color: "#007acc", display: "block", marginBottom: 4, fontWeight: 700, letterSpacing: "0.06em" }}>
                      🤖 AI Receptionist
                    </span>
                  )}
                  {msg.text}
                </div>
              </div>
            ))}

            {typing && visible < conversation.length && (
              <div style={{ display: "flex", justifyContent: conversation[visible].role === "ai" ? "flex-start" : "flex-end" }}>
                <div style={{
                  padding: "10px 16px", borderRadius: 14,
                  background: conversation[visible].role === "ai" ? "#fff" : teal,
                  boxShadow: "0 1px 6px rgba(0,0,0,0.06)", display: "flex", gap: 4, alignItems: "center"
                }}>
                  {[0,1,2].map(d => (
                    <span key={d} style={{
                      width: 6, height: 6, borderRadius: "50%",
                      background: conversation[visible].role === "ai" ? "#007acc" : "rgba(255,255,255,0.7)",
                      display: "inline-block",
                      animation: "bounce 1.2s ease-in-out " + (d * 0.2) + "s infinite"
                    }}/>
                  ))}
                </div>
              </div>
            )}
          </div>

          {visible >= conversation.length && (
            <div style={{ marginTop: 14, textAlign: "right" }}>
              <button onClick={() => { setVisible(0); setTyping(false); }} style={{
                padding: "6px 16px", fontSize: 12, background: teal, color: "#fff",
                border: "none", borderRadius: 8, cursor: "pointer", fontWeight: 600
              }}>↺ Replay</button>
            </div>
          )}
        </div>
      );
    }

    function IntercomSequence() {
      const actors = [
        { id: "staff", label: "Staff", x: 80, color: "#007acc" },
        { id: "ai", label: "AI Intercom", x: 240, color: "#0b3d91" },
        { id: "queue", label: "Task Queue", x: 400, color: "#5a6a80" },
        { id: "ehr", label: "EHR", x: 540, color: "#25a244" },
      ];
      const messages = [
        { from: 0, to: 1, label: "Voice command via intercom", y: 120, type: "solid" },
        { from: 1, to: 0, label: "Acknowledge & confirm intent", y: 160, type: "dashed" },
        { from: 1, to: 1, label: "Noise filter & transcribe", y: 200, type: "self" },
        { from: 1, to: 2, label: "Convert to structured task", y: 240, type: "solid" },
        { from: 2, to: 1, label: "Assign priority & route", y: 280, type: "dashed" },
        { from: 2, to: 0, label: "Notify assigned staff", y: 320, type: "dashed" },
        { from: 0, to: 2, label: "Acknowledge task", y: 360, type: "solid" },
        { from: 1, to: 3, label: "Write SOAP note to EHR", y: 400, type: "solid" },
        { from: 3, to: 1, label: "Confirm chart updated", y: 440, type: "dashed" },
        { from: 1, to: 2, label: "Log & close task", y: 480, type: "solid" },
      ];
      const svgH = 560;
      const lifelineY2 = svgH - 20;

      const [enlarged, setEnlarged] = useState(false);

      const svgContent = (
        <svg width="100%" viewBox={"0 0 620 " + svgH} style={{ display: "block" }}>
          <defs>
            <marker id="arrowIntercom" viewBox="0 0 10 10" refX={8} refY={5}
              markerWidth={5} markerHeight={5} orient="auto-start-reverse">
              <path d="M2 1L8 5L2 9" fill="none" stroke="#007acc"
                strokeWidth={1.5} strokeLinecap="round" strokeLinejoin="round" />
            </marker>
          </defs>
          {actors.map((a, i) => (
            <g key={a.id}>
              <rect x={a.x - 50} y={20} width={100} height={36} rx={6}
                fill={a.color} fillOpacity={0.12} stroke={a.color} strokeWidth={1} />
              <text x={a.x} y={42} textAnchor="middle" dominantBaseline="central"
                fontSize={11} fontWeight={600} fill={a.color}>{a.label}</text>
              <line x1={a.x} y1={56} x2={a.x} y2={lifelineY2}
                stroke={a.color} strokeWidth={1} strokeOpacity={0.3}
                strokeDasharray={i === 0 ? "none" : "4 3"} />
            </g>
          ))}
          {messages.map((m, i) => {
            if (m.type === "self") {
              const x = actors[m.from].x;
              return (
                <g key={i}>
                  <path d={`M${x+6} ${m.y-8} C${x+40} ${m.y-8} ${x+40} ${m.y+8} ${x+6} ${m.y+8}`}
                    fill="none" stroke="#007acc" strokeWidth={1.2}
                    markerEnd="url(#arrowIntercom)" />
                  <rect x={x+10} y={m.y - 16} width={144} height={14} rx={3}
                    fill="white" fillOpacity={0.85} />
                  <text x={x+82} y={m.y - 5} textAnchor="middle"
                    fontSize={10} fill="#1a2233" fontWeight={400}>{m.label}</text>
                </g>
              );
            }
            const x1 = actors[m.from].x;
            const x2 = actors[m.to].x;
            const dir = x2 > x1 ? 1 : -1;
            const x1e = x1 + dir * 4;
            const x2e = x2 - dir * 8;
            const midX = (x1 + x2) / 2;
            return (
              <g key={i}>
                <line x1={x1e} y1={m.y} x2={x2e} y2={m.y}
                  stroke="#007acc" strokeWidth={1.2}
                  strokeDasharray={m.type === "dashed" ? "5 3" : "none"}
                  markerEnd="url(#arrowIntercom)" />
                <rect x={midX - 72} y={m.y - 16} width={144} height={14} rx={3}
                  fill="white" fillOpacity={0.85} />
                <text x={midX} y={m.y - 5} textAnchor="middle"
                  fontSize={10} fill="#1a2233" fontWeight={400}>{m.label}</text>
              </g>
            );
          })}
          {[120, 160, 200, 240, 280, 320, 360, 400, 440].map(y => (
            <rect key={y} x={actors[1].x - 6} y={y - 10} width={12} height={20}
              rx={2} fill="#0b3d91" fillOpacity={0.2} stroke="#0b3d91" strokeWidth={0.5} />
          ))}
        </svg>
      );

      return (
        <div style={{ marginTop: "1.5rem" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
            <div style={{ fontSize: 12, color: "#888", fontWeight: 500 }}>AI Intercom — Sequence Flow</div>
            <button onClick={() => setEnlarged(true)} style={{
              display: "flex", alignItems: "center", gap: 4,
              fontSize: 11, color: "#007acc", padding: "4px 10px",
              border: "1px solid #c8dff0", borderRadius: 6, background: "#eef4fb",
            }}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
                <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
              </svg>
              Enlarge
            </button>
          </div>
          {svgContent}

          {enlarged && (
            <div onClick={() => setEnlarged(false)} style={{
              position: "fixed", inset: 0, background: "rgba(11,31,58,0.7)",
              display: "flex", alignItems: "center", justifyContent: "center",
              zIndex: 1000, padding: "1.5rem", backdropFilter: "blur(2px)",
            }}>
              <div onClick={e => e.stopPropagation()} style={{
                background: "#fff", borderRadius: 16, padding: "1.5rem",
                width: "100%", maxWidth: 860, maxHeight: "90vh", overflowY: "auto",
                boxShadow: "0 24px 64px rgba(0,0,0,0.3)",
              }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: "#0b1f3a" }}>AI Intercom — Sequence Flow</div>
                  <button onClick={() => setEnlarged(false)} style={{
                    fontSize: 11, color: "#5a6a80", padding: "4px 10px",
                    border: "1px solid #e2e8f0", borderRadius: 6, background: "#f8f9fb",
                  }}>✕ Close</button>
                </div>
                {svgContent}
              </div>
            </div>
          )}
        </div>
      );
    }

    function PhoneSequence() {
      const [enlarged, setEnlarged] = useState(false);

      const actors = [
        { id: "patient", label: "Patient", x: 80, color: "#007acc" },
        { id: "ai", label: "AI Phone", x: 240, color: "#0b3d91" },
        { id: "ehr", label: "EHR", x: 400, color: "#5a6a80" },
        { id: "sms", label: "SMS", x: 540, color: "#25a244" },
      ];

      const sections = [
        { label: "📅 New Booking", y: 96 },
        { label: "🔄 Reschedule", y: 536 },
        { label: "❌ Cancellation", y: 736 },
      ];

      const messages = [
        // ── New Booking ──
        { from: 0, to: 1, label: "Patient calls", y: 120, type: "solid" },
        { from: 1, to: 0, label: "Auto-answer & inquiry", y: 160, type: "dashed" },
        { from: 0, to: 1, label: "Describe symptoms & preferred time", y: 200, type: "solid" },
        { from: 1, to: 2, label: "Query available slots", y: 240, type: "solid" },
        { from: 2, to: 1, label: "Return available slots", y: 280, type: "dashed" },
        { from: 1, to: 0, label: "Suggest time options", y: 320, type: "dashed" },
        { from: 0, to: 1, label: "Confirm appointment", y: 360, type: "solid" },
        { from: 1, to: 2, label: "Register booking", y: 400, type: "solid" },
        { from: 1, to: 3, label: "Send confirmation SMS", y: 440, type: "solid" },
        { from: 3, to: 0, label: "SMS delivered", y: 480, type: "dashed" },
        // ── Reschedule ──
        { from: 0, to: 1, label: "Call to reschedule", y: 560, type: "solid" },
        { from: 1, to: 0, label: "Retrieve booking details", y: 600, type: "dashed" },
        { from: 1, to: 2, label: "Query new available slots", y: 640, type: "solid" },
        { from: 2, to: 1, label: "Return available slots", y: 680, type: "dashed" },
        { from: 0, to: 1, label: "Confirm new date & time", y: 720, type: "solid" },
        // ── Cancellation ──
        { from: 0, to: 1, label: "Call to cancel", y: 760, type: "solid" },
        { from: 1, to: 0, label: "Retrieve booking details", y: 800, type: "dashed" },
        { from: 0, to: 1, label: "Confirm cancellation", y: 840, type: "solid" },
        { from: 1, to: 2, label: "Delete booking", y: 880, type: "solid" },
        { from: 1, to: 3, label: "Send cancellation SMS", y: 920, type: "solid" },
        { from: 3, to: 0, label: "SMS delivered", y: 960, type: "dashed" },
      ];

      const svgH = 1000;
      const lifelineY2 = svgH - 20;

      const aiActivations = [
        120,160,200,240,280,320,360,400,440,
        560,600,640,680,720,
        760,800,840,880,920,
      ];

      const svgContent = (
        <svg width="100%" viewBox={"0 0 620 " + svgH} style={{ display: "block" }}>
          <defs>
            <marker id="arrowSeq" viewBox="0 0 10 10" refX={8} refY={5}
              markerWidth={5} markerHeight={5} orient="auto-start-reverse">
              <path d="M2 1L8 5L2 9" fill="none" stroke="#007acc"
                strokeWidth={1.5} strokeLinecap="round" strokeLinejoin="round" />
            </marker>
          </defs>

          {/* Lifelines */}
          {actors.map((a, i) => (
            <g key={a.id}>
              {i === 0 ? (
                <>
                  {/* Patient — person icon */}
                  {/* head */}
                  <circle cx={a.x} cy={9} r={7}
                    fill={a.color} fillOpacity={0.15} stroke={a.color} strokeWidth={1.5} />
                  {/* body / shoulders */}
                  <path d={`M${a.x - 12} 32 C${a.x - 12} 22 ${a.x - 5} 19 ${a.x} 19 C${a.x + 5} 19 ${a.x + 12} 22 ${a.x + 12} 32`}
                    fill={a.color} fillOpacity={0.15} stroke={a.color} strokeWidth={1.5} strokeLinecap="round" />
                  <rect x={a.x - 32} y={34} width={64} height={18} rx={4}
                    fill={a.color} fillOpacity={0.12} stroke={a.color} strokeWidth={1} />
                  <text x={a.x} y={46} textAnchor="middle" dominantBaseline="central"
                    fontSize={11} fontWeight={600} fill={a.color}>{a.label}</text>
                  <line x1={a.x} y1={52} x2={a.x} y2={lifelineY2}
                    stroke={a.color} strokeWidth={1} strokeOpacity={0.3} />
                </>
              ) : (
                <>
                  <rect x={a.x - 50} y={20} width={100} height={36} rx={6}
                    fill={a.color} fillOpacity={0.12} stroke={a.color} strokeWidth={1} />
                  <text x={a.x} y={42} textAnchor="middle" dominantBaseline="central"
                    fontSize={11} fontWeight={600} fill={a.color}>{a.label}</text>
                  <line x1={a.x} y1={56} x2={a.x} y2={lifelineY2}
                    stroke={a.color} strokeWidth={1} strokeOpacity={0.3}
                    strokeDasharray="4 3" />
                </>
              )}
            </g>
          ))}

          {/* Section dividers */}
          {sections.map((s, i) => (
            <g key={"sec" + i}>
              <line x1={16} y1={s.y} x2={604} y2={s.y}
                stroke="#e2e8f0" strokeWidth={1} strokeDasharray="4 3" />
              <rect x={16} y={s.y - 11} width={130} height={18} rx={4}
                fill={i === 0 ? "#eef4fb" : i === 1 ? "#fff8e1" : "#fef2f2"}
                stroke={i === 0 ? "#a8cef0" : i === 1 ? "#f9a825" : "#fca5a5"}
                strokeWidth={0.8} />
              <text x={24} y={s.y + 2} fontSize={10} fontWeight={600}
                fill={i === 0 ? "#0b3d91" : i === 1 ? "#b45309" : "#dc2626"}>
                {s.label}
              </text>
            </g>
          ))}

          {/* Messages */}
          {messages.map((m, i) => {
            const x1 = actors[m.from].x;
            const x2 = actors[m.to].x;
            const dir = x2 > x1 ? 1 : -1;
            const x1e = x1 + dir * 4;
            const x2e = x2 - dir * 8;
            const midX = (x1 + x2) / 2;
            const isCancel = m.y >= 760;
            const isResched = m.y >= 560 && m.y < 760;
            const arrowColor = isCancel ? "#dc2626" : isResched ? "#b45309" : "#007acc";
            return (
              <g key={i}>
                <line x1={x1e} y1={m.y} x2={x2e} y2={m.y}
                  stroke={arrowColor} strokeWidth={1.2}
                  strokeDasharray={m.type === "dashed" ? "5 3" : "none"}
                  markerEnd="url(#arrowSeq)" />
                <rect x={midX - 80} y={m.y - 16} width={160} height={14} rx={3}
                  fill="white" fillOpacity={0.88} />
                <text x={midX} y={m.y - 5} textAnchor="middle"
                  fontSize={10} fill="#1a2233" fontWeight={400}>{m.label}</text>
              </g>
            );
          })}

          {/* AI activation boxes */}
          {aiActivations.map(y => (
            <rect key={y} x={actors[1].x - 6} y={y - 10} width={12} height={20}
              rx={2} fill="#0b3d91" fillOpacity={0.2} stroke="#0b3d91" strokeWidth={0.5} />
          ))}
        </svg>
      );

      return (
        <div style={{ marginTop: "1.5rem" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
            <div style={{ fontSize: 12, color: "#888", fontWeight: 500 }}>AI Phone Booking — Sequence Flow</div>
            <button onClick={() => setEnlarged(true)} style={{
              display: "flex", alignItems: "center", gap: 4,
              fontSize: 11, color: "#007acc", padding: "4px 10px",
              border: "1px solid #c8dff0", borderRadius: 6, background: "#eef4fb",
            }}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
                <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
              </svg>
              Enlarge
            </button>
          </div>
          {svgContent}

          {enlarged && (
            <div onClick={() => setEnlarged(false)} style={{
              position: "fixed", inset: 0, background: "rgba(11,31,58,0.7)",
              display: "flex", alignItems: "center", justifyContent: "center",
              zIndex: 1000, padding: "1.5rem", backdropFilter: "blur(2px)",
            }}>
              <div onClick={e => e.stopPropagation()} style={{
                background: "#fff", borderRadius: 16, padding: "1.5rem",
                width: "100%", maxWidth: 860, maxHeight: "90vh", overflowY: "auto",
                boxShadow: "0 24px 64px rgba(0,0,0,0.3)",
              }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: "#0b1f3a" }}>AI Phone Booking — Sequence Flow</div>
                  <button onClick={() => setEnlarged(false)} style={{
                    fontSize: 11, color: "#5a6a80", padding: "4px 10px",
                    border: "1px solid #e2e8f0", borderRadius: 6, background: "#f8f9fb",
                  }}>✕ Close</button>
                </div>
                {svgContent}
              </div>
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [tab, setTab] = useState("phone");
      const isPhone = tab === "phone";

      return (
        <div style={{ maxWidth: 740, margin: "0 auto", padding: "2rem 1.25rem", background: "#f8f9fb", minHeight: "100vh" }}>
          <a href="/en/" style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 13, color: "#5a6a80", textDecoration: "none", marginBottom: "1rem", padding: "5px 10px", borderRadius: 6, border: "1px solid #e2e8f0", background: "#fff" }}>
            ← Back to Home
          </a>

          <div style={{ fontSize: 11, fontWeight: 700, color: "#007acc", letterSpacing: "0.18em", textTransform: "uppercase", margin: "0 0 8px", display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ display: "inline-block", width: 5, height: 5, borderRadius: "50%", background: "#007acc" }}></span>
            Dental AI Platform · Powered by Burai Live
          </div>
          <div style={{ fontSize: 26, fontWeight: 800, margin: "0 0 6px", color: "#0b1f3a", letterSpacing: "-0.02em", lineHeight: 1.2 }}>AI Systems for Dental Clinics</div>
          <div style={{ fontSize: 13, color: "#5a6a80", margin: "0 0 1.75rem", lineHeight: 1.6 }}>AI-powered phone booking &amp; intercom systems — designed for modern dental clinics in Japan.</div>

          <div style={{ display: "flex", gap: 4, marginBottom: "1.75rem", background: "#e8edf2", padding: 4, borderRadius: 12 }}>
            {[{ id: "phone", label: "📞 AI Phone Booking" }, { id: "intercom", label: "🎙️ AI Intercom" }].map(t => (
              <button key={t.id} onClick={() => setTab(t.id)} style={{
                flex: 1, padding: "8px 0", fontSize: 13, fontWeight: 500, borderRadius: 8,
                background: tab === t.id ? "#fff" : "transparent",
                color: tab === t.id ? teal : "#888",
                border: tab === t.id ? "1px solid #e2e8f0" : "1px solid transparent",
                boxShadow: tab === t.id ? "0 1px 4px rgba(0,0,0,0.06)" : "none",
              }}>{t.label}</button>
            ))}
          </div>

          <FlowDiagram steps={isPhone ? PHONE_FLOW : INTERCOM_FLOW} />
          <FeatureGrid features={isPhone ? PHONE_FEATURES : INTERCOM_FEATURES} />
          {isPhone && <PhoneDemo />}
          {isPhone && <PhoneSequence />}
          {!isPhone && <IntercomSequence />}

          <div style={{ marginTop: "2rem", padding: "1.25rem", background: "#fff", borderRadius: 12, border: "1px solid #e2e8f0", textAlign: "center" }}>
            <div style={{ fontSize: 15, fontWeight: 700, color: "#0b1f3a", marginBottom: 6 }}>Interested in Dental AI?</div>
            <div style={{ fontSize: 13, color: "#5a6a80", marginBottom: 12 }}>Contact us for a demo or custom quote.</div>
            <a href="/en/contact/" style={{ display: "inline-block", background: "#007acc", color: "#fff", padding: "8px 24px", borderRadius: 8, textDecoration: "none", fontSize: 13, fontWeight: 600 }}>Contact Us →</a>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("dental-root")).render(<App />);
  </script>
</body>
</html>
