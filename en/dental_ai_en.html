const PHONE_FLOW = [

function FlowDiagram({ steps }) {
  const [active, setActive] = useState(null);
  return (
    <div style={{ display: "flex", alignItems: "flex-start", gap: 0, flexWrap: "wrap", justifyContent: "center", padding: "1.5rem 0 1rem" }}>
      {steps.map((step, i) => (
        <div key={step.id} style={{ display: "flex", alignItems: "center" }}>
          <div onClick={() => setActive(active === step.id ? null : step.id)}
            style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 8, cursor: "pointer" }}>
            <div style={{
              width: 56, height: 56, borderRadius: "50%",
              background: active === step.id ? step.color : tealLight,
              display: "flex", alignItems: "center", justifyContent: "center",
              border: `2px solid ${active === step.id ? step.color : tealMid}`,
            }}>
              <i className={`ti ${step.icon}`} style={{ fontSize: 22, color: active === step.id ? "#fff" : step.color }} />
            </div>
            <div style={{ textAlign: "center", width: 80 }}>
              <div style={{ fontSize: 11, fontWeight: 500, color: active === step.id ? step.color : "#1a1a1a", lineHeight: 1.3 }}>{step.label}</div>
              {active === step.id && (
                <div style={{ fontSize: 10, color: "#888", marginTop: 4, lineHeight: 1.4 }}>{step.desc}</div>
              )}
            </div>
          </div>
          {i < steps.length - 1 && (
            <div style={{ width: 24, height: 2, background: tealMid, margin: "0 4px", marginBottom: 16, opacity: 0.6, flexShrink: 0 }} />
          )}
        </div>
      ))}
    </div>
  );
}

function FeatureGrid({ features }) {
  return (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 12, marginTop: "1rem" }}>
      {features.map((f, i) => (
        <div key={i} style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 12, padding: "1rem 1.25rem", boxShadow: "0 2px 8px rgba(11,61,145,0.04)" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
            <div style={{ width: 32, height: 32, borderRadius: 8, background: tealLight, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
              <i className={`ti ${f.icon}`} style={{ fontSize: 16, color: teal }} />
            </div>
            <span style={{ fontSize: 13, fontWeight: 500, lineHeight: 1.3 }}>{f.title}</span>
          </div>
          <p style={{ fontSize: 12, color: "#666", margin: 0, lineHeight: 1.6 }}>{f.desc}</p>
        </div>
      ))}
    </div>
  );
}

function PhoneDemo() {
  const [step, setStep] = useState(0);
  const conversation = [
    { role: "ai", text: "Thank you for calling Sakura Dental Clinic. This is our AI receptionist — how can I help you today?" },
    { role: "user", text: "Hi, I've been having some tooth pain and I'd also like to schedule a routine check-up next week." },
    { role: "ai", text: "I'm sorry to hear about the pain — let's get you seen as soon as possible. Next week I have Tuesday at 10:00 AM and Thursday at 2:30 PM available. Which works better for you?" },
    { role: "user", text: "Thursday at 2:30 PM, please." },
    { role: "ai", text: "Thursday at 2:30 PM is confirmed. I'll send a confirmation SMS shortly. We look forward to seeing you — please take care!" },
  ];
  return (
    <div style={{ background: "#f0f4f8", borderRadius: 12, padding: "1rem", marginTop: "1rem", border: "1px solid #e2e8f0" }}>
      <div style={{ fontSize: 12, color: "#888", marginBottom: 12 }}>Call demo — step through the conversation</div>
      <div style={{ display: "flex", flexDirection: "column", gap: 10, minHeight: 160 }}>
        {conversation.slice(0, step + 1).map((msg, i) => (
          <div key={i} style={{ display: "flex", justifyContent: msg.role === "ai" ? "flex-start" : "flex-end" }}>
            <div style={{
              maxWidth: "78%", padding: "8px 12px", borderRadius: 12,
              background: msg.role === "ai" ? tealLight : blueLight,
              fontSize: 13, lineHeight: 1.6,
              borderBottomLeftRadius: msg.role === "ai" ? 2 : 12,
              borderBottomRightRadius: msg.role === "user" ? 2 : 12,
            }}>
              {msg.role === "ai" && <span style={{ fontSize: 11, color: "#007acc", display: "block", marginBottom: 2, fontWeight: 600, letterSpacing: "0.04em" }}>AI Receptionist</span>}
              {msg.text}
            </div>
          </div>
        ))}
      </div>
      <div style={{ marginTop: 12, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontSize: 11, color: "#888" }}>{step + 1} / {conversation.length}</span>
        <button onClick={() => setStep(s => Math.min(s + 1, conversation.length - 1))}
          disabled={step >= conversation.length - 1}
          style={{ fontSize: 12, padding: "6px 16px", opacity: step >= conversation.length - 1 ? 0.4 : 1 }}>
          Next turn →
        </button>
      </div>
    </div>
  );
}

function IntercomDemo() {
  const [active, setActive] = useState(null);
  const commands = [
    { voice: '"Get anesthesia ready at chair 4"', action: "Staff assign", detail: "Nurse: Johnson → push notification sent to chair 4", icon: "ti-arrows-right", color: teal },
    { voice: '"Please rinse twice, Mrs. Smith"', action: "Patient instruction", detail: "Audio announcement played at chair 4", icon: "ti-speakerphone", color: blue },
    { voice: '"Next patient: lower right 6, composite restoration"', action: "Chart update", detail: "Auto-entered in SOAP format to EHR", icon: "ti-clipboard-text", color: amber },
    { voice: '"Bring suction — urgent!"', action: "Urgent task", detail: "Emergency push notification sent to all staff", icon: "ti-bolt", color: "#A32D2D" },
  ];
  return (
    <div style={{ marginTop: "1rem", display: "flex", flexDirection: "column", gap: 8 }}>
      {commands.map((cmd, i) => (
        <div key={i} onClick={() => setActive(active === i ? null : i)}
          style={{ background: active === i ? "#fff" : "#f8f8f8", border: `0.5px solid ${active === i ? cmd.color : "#ddd"}`, borderRadius: 8, padding: "10px 14px", cursor: "pointer" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <i className="ti ti-microphone" style={{ fontSize: 14, color: "#888", flexShrink: 0 }} />
            <span style={{ fontSize: 13, flex: 1 }}>{cmd.voice}</span>
            <span style={{ fontSize: 11, padding: "2px 8px", borderRadius: 4, background: cmd.color + "20", color: cmd.color, fontWeight: 500, whiteSpace: "nowrap" }}>{cmd.action}</span>
          </div>
          {active === i && (
            <div style={{ marginTop: 8, paddingTop: 8, borderTop: "0.5px solid #eee", display: "flex", alignItems: "center", gap: 8 }}>
              <i className={`ti ${cmd.icon}`} style={{ fontSize: 14, color: cmd.color }} />
              <span style={{ fontSize: 12, color: "#666" }}>{cmd.detail}</span>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

          <div style={{ padding: "9px 14px", fontSize: 12 }}>{r[1]}</div>
        </div>
      ))}
    </div>
  );
}
