<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dental AI Platform</title>
<link rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  body { font-family: sans-serif; background: #fff; color: #1a1a1a; margin: 0; padding: 1rem; }
  button { font-family: inherit; border: 0.5px solid #ccc; background: transparent; border-radius: 8px; cursor: pointer; }
  button:hover { background: #f5f5f5; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState } = React;

const teal = "#0F6E56";
const teal2 = "#1D9E75";
const tealLight = "#E1F5EE";
const tealMid = "#9FE1CB";
const blue = "#185FA5";
const blueLight = "#E6F1FB";
const amber = "#BA7517";
const amberLight = "#FAEEDA";

const PHONE_FLOW = [
  { id: 1, icon: "ti-phone-incoming", label: "Incoming Call", desc: "Patient call is received", color: teal },
  { id: 2, icon: "ti-robot", label: "AI Recognition", desc: "Natural language conversation & intent detection", color: blue },
  { id: 3, icon: "ti-calendar-check", label: "Availability", desc: "Real-time appointment slot search", color: teal2 },
  { id: 4, icon: "ti-database", label: "Booking", desc: "Auto-sync with electronic health record", color: amber },
  { id: 5, icon: "ti-message-check", label: "SMS Reminder", desc: "Automated confirmation sent to patient", color: teal },
];

const INTERCOM_FLOW = [
  { id: 1, icon: "ti-microphone", label: "Voice Input", desc: "Staff speaks via clinic intercom", color: teal },
  { id: 2, icon: "ti-brain", label: "AI Analysis", desc: "Context understanding & classification", color: blue },
  { id: 3, icon: "ti-list-check", label: "Task Convert", desc: "Voice command converted to task", color: teal2 },
  { id: 4, icon: "ti-users", label: "Staff Dispatch", desc: "Real-time delivery to assigned staff", color: amber },
  { id: 5, icon: "ti-chart-bar", label: "Log & Insights", desc: "Workflow logging & improvement tips", color: teal },
];

const PHONE_FEATURES = [
  { icon: "ti-clock-24", title: "24/7 Availability", desc: "Accepts bookings overnight and on holidays — zero missed calls." },
  { icon: "ti-language", title: "Multilingual Support", desc: "Handles English, Japanese, Chinese, Korean, and more automatically." },
  { icon: "ti-heartbeat", title: "Symptom Triage", desc: "Assesses pain type and urgency, then suggests the right appointment slot." },
  { icon: "ti-refresh", title: "Cancel & Reschedule", desc: "Existing appointments can be changed or cancelled by voice, instantly." },
  { icon: "ti-shield-check", title: "Privacy Compliant", desc: "Encrypted calls, HIPAA-aligned data handling, and local storage options." },
  { icon: "ti-chart-dots", title: "Analytics Dashboard", desc: "Live view of call volume, booking conversion rate, and peak hours." },
];

const INTERCOM_FEATURES = [
  { icon: "ti-bolt", title: "Hands-Free Operation", desc: "Record notes and issue instructions by voice even with gloves on." },
  { icon: "ti-stethoscope", title: "Dental Terminology", desc: "High-accuracy recognition of procedure codes and clinical vocabulary." },
  { icon: "ti-arrows-sort", title: "Priority Sorting", desc: "Urgent requests are automatically escalated to the top of the queue." },
  { icon: "ti-clipboard-text", title: "Auto Chart Entry", desc: "Voice memos are formatted into SOAP notes and written to the EHR." },
  { icon: "ti-speakerphone", title: "Noise Cancellation", desc: "Filters out turbines, suction, and HVAC — captures voice only." },
  { icon: "ti-lock", title: "Secure Channel", desc: "On-premises network design — audio data never leaves the clinic." },
];

function FlowDiagram({ steps }) {
  const [active, setActive] = useState(null);
  return (
    <div style={{ display: "flex", alignItems: "flex-start", gap: 0, flexWrap: "wrap", justifyContent: "center", padding: "1.5rem 0 1rem" }}>
      {steps.map((step, i) => (
        <div key={step.id} style={{ display: "flex", alignItems: "center" }}>
          <div onClick={() => setActive(active === step.id ? null : step.id)}
            style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 8, cursor: "pointer" }}>
            <div style={{
              width: 56, height: 56, borderRadius: "50%",
              background: active === step.id ? step.color : tealLight,
              display: "flex", alignItems: "center", justifyContent: "center",
              border: `2px solid ${active === step.id ? step.color : tealMid}`,
            }}>
              <i className={`ti ${step.icon}`} style={{ fontSize: 22, color: active === step.id ? "#fff" : step.color }} />
            </div>
            <div style={{ textAlign: "center", width: 80 }}>
              <div style={{ fontSize: 11, fontWeight: 500, color: active === step.id ? step.color : "#1a1a1a", lineHeight: 1.3 }}>{step.label}</div>
              {active === step.id && (
                <div style={{ fontSize: 10, color: "#888", marginTop: 4, lineHeight: 1.4 }}>{step.desc}</div>
              )}
            </div>
          </div>
          {i < steps.length - 1 && (
            <div style={{ width: 24, height: 2, background: tealMid, margin: "0 4px", marginBottom: 16, opacity: 0.6, flexShrink: 0 }} />
          )}
        </div>
      ))}
    </div>
  );
}

function FeatureGrid({ features }) {
  return (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 12, marginTop: "1rem" }}>
      {features.map((f, i) => (
        <div key={i} style={{ background: "#fff", border: "0.5px solid #ddd", borderRadius: 12, padding: "1rem 1.25rem" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
            <div style={{ width: 32, height: 32, borderRadius: 8, background: tealLight, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
              <i className={`ti ${f.icon}`} style={{ fontSize: 16, color: teal }} />
            </div>
            <span style={{ fontSize: 13, fontWeight: 500, lineHeight: 1.3 }}>{f.title}</span>
          </div>
          <p style={{ fontSize: 12, color: "#666", margin: 0, lineHeight: 1.6 }}>{f.desc}</p>
        </div>
      ))}
    </div>
  );
}

function PhoneDemo() {
  const [step, setStep] = useState(0);
  const conversation = [
    { role: "ai", text: "Thank you for calling Sakura Dental Clinic. This is our AI receptionist — how can I help you today?" },
    { role: "user", text: "Hi, I've been having some tooth pain and I'd also like to schedule a routine check-up next week." },
    { role: "ai", text: "I'm sorry to hear about the pain — let's get you seen as soon as possible. Next week I have Tuesday at 10:00 AM and Thursday at 2:30 PM available. Which works better for you?" },
    { role: "user", text: "Thursday at 2:30 PM, please." },
    { role: "ai", text: "Thursday at 2:30 PM is confirmed. I'll send a confirmation SMS shortly. We look forward to seeing you — please take care!" },
  ];
  return (
    <div style={{ background: "#f8f8f8", borderRadius: 12, padding: "1rem", marginTop: "1rem" }}>
      <div style={{ fontSize: 12, color: "#888", marginBottom: 12 }}>Call demo — step through the conversation</div>
      <div style={{ display: "flex", flexDirection: "column", gap: 10, minHeight: 160 }}>
        {conversation.slice(0, step + 1).map((msg, i) => (
          <div key={i} style={{ display: "flex", justifyContent: msg.role === "ai" ? "flex-start" : "flex-end" }}>
            <div style={{
              maxWidth: "78%", padding: "8px 12px", borderRadius: 12,
              background: msg.role === "ai" ? tealLight : blueLight,
              fontSize: 13, lineHeight: 1.6,
              borderBottomLeftRadius: msg.role === "ai" ? 2 : 12,
              borderBottomRightRadius: msg.role === "user" ? 2 : 12,
            }}>
              {msg.role === "ai" && <span style={{ fontSize: 11, color: teal, display: "block", marginBottom: 2, fontWeight: 500 }}>AI Receptionist</span>}
              {msg.text}
            </div>
          </div>
        ))}
      </div>
      <div style={{ marginTop: 12, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontSize: 11, color: "#888" }}>{step + 1} / {conversation.length}</span>
        <button onClick={() => setStep(s => Math.min(s + 1, conversation.length - 1))}
          disabled={step >= conversation.length - 1}
          style={{ fontSize: 12, padding: "6px 16px", opacity: step >= conversation.length - 1 ? 0.4 : 1 }}>
          Next turn →
        </button>
      </div>
    </div>
  );
}

function IntercomDemo() {
  const [active, setActive] = useState(null);
  const commands = [
    { voice: '"Get anesthesia ready at chair 4"', action: "Staff assign", detail: "Nurse: Johnson → push notification sent to chair 4", icon: "ti-arrows-right", color: teal },
    { voice: '"Please rinse twice, Mrs. Smith"', action: "Patient instruction", detail: "Audio announcement played at chair 4", icon: "ti-speakerphone", color: blue },
    { voice: '"Next patient: lower right 6, composite restoration"', action: "Chart update", detail: "Auto-entered in SOAP format to EHR", icon: "ti-clipboard-text", color: amber },
    { voice: '"Bring suction — urgent!"', action: "Urgent task", detail: "Emergency push notification sent to all staff", icon: "ti-bolt", color: "#A32D2D" },
  ];
  return (
    <div style={{ marginTop: "1rem", display: "flex", flexDirection: "column", gap: 8 }}>
      {commands.map((cmd, i) => (
        <div key={i} onClick={() => setActive(active === i ? null : i)}
          style={{ background: active === i ? "#fff" : "#f8f8f8", border: `0.5px solid ${active === i ? cmd.color : "#ddd"}`, borderRadius: 8, padding: "10px 14px", cursor: "pointer" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <i className="ti ti-microphone" style={{ fontSize: 14, color: "#888", flexShrink: 0 }} />
            <span style={{ fontSize: 13, flex: 1 }}>{cmd.voice}</span>
            <span style={{ fontSize: 11, padding: "2px 8px", borderRadius: 4, background: cmd.color + "20", color: cmd.color, fontWeight: 500, whiteSpace: "nowrap" }}>{cmd.action}</span>
          </div>
          {active === i && (
            <div style={{ marginTop: 8, paddingTop: 8, borderTop: "0.5px solid #eee", display: "flex", alignItems: "center", gap: 8 }}>
              <i className={`ti ${cmd.icon}`} style={{ fontSize: 14, color: cmd.color }} />
              <span style={{ fontSize: 12, color: "#666" }}>{cmd.detail}</span>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

function SpecTable({ rows }) {
  return (
    <div style={{ marginTop: "1rem", border: "0.5px solid #ddd", borderRadius: 8, overflow: "hidden" }}>
      {rows.map((r, i) => (
        <div key={i} style={{ display: "flex", borderBottom: i < rows.length - 1 ? "0.5px solid #eee" : "none", background: i % 2 === 0 ? "#fff" : "#f8f8f8" }}>
          <div style={{ padding: "9px 14px", fontSize: 12, fontWeight: 500, color: teal, width: 180, flexShrink: 0, borderRight: "0.5px solid #eee" }}>{r[0]}</div>
          <div style={{ padding: "9px 14px", fontSize: 12 }}>{r[1]}</div>
        </div>
      ))}
    </div>
  );
}

const phoneSpecs = [
  ["Voice accuracy", "99.2% (tuned for dental terminology)"],
  ["Concurrent lines", "Up to 50 simultaneous calls (scalable)"],
  ["Languages", "English / Japanese / Chinese / Korean"],
  ["EHR integration", "Orca / Denty / custom EMR API"],
  ["Avg. response time", "< 1.5 seconds (end-to-end)"],
  ["Uptime SLA", "99.9% (monthly guarantee)"],
  ["Notifications", "SMS / LINE / Email auto-send"],
  ["Data storage", "Local region / AES-256 encrypted"],
];

const intercomSpecs = [
  ["Recognition accuracy", "98.7% (in dental operatory noise)"],
  ["Latency", "< 0.3 seconds (real-time)"],
  ["Devices", "Headset / desktop mic / smartphone"],
  ["EHR entry", "Auto SOAP-format chart input"],
  ["Staff alerts", "iOS / Android app + tablet display"],
  ["Noise filtering", "Turbine / suction / HVAC suppression"],
  ["Security", "On-premises LAN — no external audio send"],
  ["Analytics", "Task frequency / response time / workflow tips"],
];

function App() {
  const [tab, setTab] = useState(0);
  const tabs = [
    { label: "AI Phone Booking", icon: "ti-phone" },
    { label: "AI Intercom", icon: "ti-speakerphone" },
    { label: "Integration", icon: "ti-git-merge" },
  ];
  return (
    <div style={{ maxWidth: 700, margin: "0 auto", padding: "1.5rem 0" }}>
      <div style={{ fontSize: 11, fontWeight: 500, color: teal, letterSpacing: "0.1em", textTransform: "uppercase", margin: "0 0 6px" }}>Dental AI Platform</div>
      <div style={{ fontSize: 22, fontWeight: 500, margin: "0 0 4px" }}>AI Systems for Dental Clinics</div>
      <div style={{ fontSize: 13, color: "#888", margin: "0 0 1.5rem" }}>Design overview — Phone Booking & Intercom systems</div>

      <div style={{ display: "flex", gap: 4, marginBottom: "1.5rem", background: "#f0f0f0", padding: 4, borderRadius: 12 }}>
        {tabs.map((t, i) => (
          <button key={i} onClick={() => setTab(i)} style={{
            flex: 1, padding: "8px 4px", fontSize: 12, fontWeight: tab === i ? 500 : 400,
            background: tab === i ? "#fff" : "transparent",
            border: tab === i ? "0.5px solid #ccc" : "0.5px solid transparent",
            borderRadius: 8, cursor: "pointer",
            color: tab === i ? teal : "#888",
            display: "flex", alignItems: "center", justifyContent: "center", gap: 5,
          }}>
            <i className={`ti ${t.icon}`} style={{ fontSize: 14 }} />
            {t.label}
          </button>
        ))}
      </div>

      {tab === 0 && (
        <div>
          <div style={{ background: tealLight, borderRadius: 12, padding: "1rem 1.25rem", marginBottom: "1.25rem", display: "flex", gap: 12 }}>
            <div style={{ width: 40, height: 40, borderRadius: 10, background: teal, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
              <i className="ti ti-phone-call" style={{ fontSize: 20, color: "#fff" }} />
            </div>
            <div>
              <div style={{ fontSize: 15, fontWeight: 500, color: teal, marginBottom: 4 }}>AI Phone Booking System</div>
              <div style={{ fontSize: 13, color: "#555", lineHeight: 1.6 }}>An AI receptionist that answers patient calls 24/7. It handles natural conversation, symptom triage, slot booking, and automated SMS confirmation — fully hands-off.</div>
            </div>
          </div>
          <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 4 }}>Processing flow</div>
          <FlowDiagram steps={PHONE_FLOW} />
          <div style={{ fontSize: 11, color: "#888", textAlign: "center", marginBottom: "1rem" }}>Click each step for details</div>
          <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 4 }}>Conversation demo</div>
          <PhoneDemo />
          <div style={{ fontSize: 13, fontWeight: 500, margin: "1.5rem 0 4px" }}>Key features</div>
          <FeatureGrid features={PHONE_FEATURES} />
          <div style={{ fontSize: 13, fontWeight: 500, margin: "1.5rem 0 4px" }}>Technical specs</div>
          <SpecTable rows={phoneSpecs} />
        </div>
      )}

      {tab === 1 && (
        <div>
          <div style={{ background: blueLight, borderRadius: 12, padding: "1rem 1.25rem", marginBottom: "1.25rem", display: "flex", gap: 12 }}>
            <div style={{ width: 40, height: 40, borderRadius: 10, background: blue, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
              <i className="ti ti-speakerphone" style={{ fontSize: 20, color: "#fff" }} />
            </div>
            <div>
              <div style={{ fontSize: 15, fontWeight: 500, color: blue, marginBottom: 4 }}>AI Intercom System</div>
              <div style={{ fontSize: 13, color: "#555", lineHeight: 1.6 }}>AI-mediated voice communication between operatory staff. Enables hands-free task dispatch, chart entry, and priority management — without touching a screen.</div>
            </div>
          </div>
          <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 4 }}>Processing flow</div>
          <FlowDiagram steps={INTERCOM_FLOW} />
          <div style={{ fontSize: 11, color: "#888", textAlign: "center", marginBottom: "1rem" }}>Click each step for details</div>
          <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 4 }}>Voice command demo</div>
          <div style={{ fontSize: 12, color: "#888", marginBottom: 8 }}>Tap each command to see how AI interprets it</div>
          <IntercomDemo />
          <div style={{ fontSize: 13, fontWeight: 500, margin: "1.5rem 0 4px" }}>Key features</div>
          <FeatureGrid features={INTERCOM_FEATURES} />
          <div style={{ fontSize: 13, fontWeight: 500, margin: "1.5rem 0 4px" }}>Technical specs</div>
          <SpecTable rows={intercomSpecs} />
        </div>
      )}

      {tab === 2 && (
        <div>
          <div style={{ background: amberLight, borderRadius: 12, padding: "1rem 1.25rem", marginBottom: "1.25rem", display: "flex", gap: 12 }}>
            <div style={{ width: 40, height: 40, borderRadius: 10, background: amber, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
              <i className="ti ti-git-merge" style={{ fontSize: 20, color: "#fff" }} />
            </div>
            <div>
              <div style={{ fontSize: 15, fontWeight: 500, color: amber, marginBottom: 4 }}>Unified Integration Architecture</div>
              <div style={{ fontSize: 13, color: "#555", lineHeight: 1.6 }}>Both systems connect to the same patient database and EHR. Booking data flows into the operatory in real time, keeping front desk and clinical staff in sync.</div>
            </div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>
            {[
              { title: "AI Phone Booking", icon: "ti-phone", color: teal, bg: tealLight, items: ["Speech recognition engine", "Appointment management API", "SMS notification service", "Multilingual module"] },
              { title: "AI Intercom", icon: "ti-speakerphone", color: blue, bg: blueLight, items: ["Real-time voice recognition", "NLU & intent parsing", "Staff notification app", "Auto chart entry"] },
            ].map((s, i) => (
              <div key={i} style={{ background: s.bg, borderRadius: 12, padding: "1rem" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 10 }}>
                  <i className={`ti ${s.icon}`} style={{ fontSize: 16, color: s.color }} />
                  <span style={{ fontSize: 13, fontWeight: 500, color: s.color }}>{s.title}</span>
                </div>
                {s.items.map((item, j) => (
                  <div key={j} style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 5 }}>
                    <div style={{ width: 4, height: 4, borderRadius: "50%", background: s.color, flexShrink: 0 }} />
                    <span style={{ fontSize: 12, color: "#555" }}>{item}</span>
                  </div>
                ))}
              </div>
            ))}
          </div>

          <div style={{ background: "#fff", border: `1.5px solid ${amber}`, borderRadius: 12, padding: "1rem 1.25rem", marginBottom: 16 }}>
            <div style={{ fontSize: 12, fontWeight: 500, color: amber, marginBottom: 8 }}>Shared infrastructure layer</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap: 8 }}>
              {[
                { icon: "ti-database", label: "Patient master DB" },
                { icon: "ti-file-text", label: "Electronic health record" },
                { icon: "ti-bell", label: "Notification orchestrator" },
                { icon: "ti-chart-bar", label: "Unified analytics" },
              ].map((c, i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, padding: "7px 10px", background: amberLight, borderRadius: 8 }}>
                  <i className={`ti ${c.icon}`} style={{ fontSize: 14, color: amber }} />
                  <span style={{ fontSize: 12 }}>{c.label}</span>
                </div>
              ))}
            </div>
          </div>

          <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 12 }}>Recommended development phases</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>
            {[
              { phase: "Phase 1", period: "1–2 months", title: "Foundation", items: ["Patient DB schema", "EHR API connection", "Auth & security layer"], color: teal },
              { phase: "Phase 2", period: "2–3 months", title: "Phone Booking", items: ["Speech recognition setup", "Booking logic", "SMS integration", "Beta testing"], color: blue },
              { phase: "Phase 3", period: "2–3 months", title: "Intercom", items: ["Hardware selection", "Real-time NLU", "Staff app development", "On-site testing"], color: amber },
              { phase: "Phase 4", period: "1 month", title: "Integration & polish", items: ["End-to-end testing", "Analytics dashboard", "Staff training"], color: teal2 },
            ].map((p, i) => (
              <div key={i} style={{ display: "flex", gap: 12, paddingBottom: i < 3 ? 16 : 0 }}>
                <div style={{ display: "flex", flexDirection: "column", alignItems: "center", flexShrink: 0 }}>
                  <div style={{ width: 10, height: 10, borderRadius: "50%", background: p.color, border: `2px solid ${p.color}`, marginTop: 3 }} />
                  {i < 3 && <div style={{ width: 2, flex: 1, background: "#ddd", marginTop: 4 }} />}
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 4 }}>
                    <span style={{ fontSize: 12, fontWeight: 500, color: p.color }}>{p.phase}</span>
                    <span style={{ fontSize: 12, color: "#555" }}>{p.title}</span>
                    <span style={{ fontSize: 11, color: "#888", marginLeft: "auto" }}>{p.period}</span>
                  </div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                    {p.items.map((item, j) => (
                      <span key={j} style={{ fontSize: 11, padding: "2px 8px", borderRadius: 4, background: "#f0f0f0", color: "#666" }}>{item}</span>
                    ))}
                  </div>
                </div>
              </div>
            ))}
          </div>

          <div style={{ fontSize: 13, fontWeight: 500, margin: "1.5rem 0 0.75rem" }}>Estimated monthly costs (production)</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap: 10 }}>
            {[
              { label: "Phone booking API", value: "$200+", note: "Based on call volume" },
              { label: "Intercom cloud", value: "$140+", note: "Based on chair count" },
              { label: "SMS & notifications", value: "$35+", note: "Based on send volume" },
              { label: "Support & maintenance", value: "$100+", note: "SLA options available" },
            ].map((c, i) => (
              <div key={i} style={{ background: "#f8f8f8", borderRadius: 8, padding: "0.875rem 1rem" }}>
                <div style={{ fontSize: 11, color: "#888", marginBottom: 4 }}>{c.label}</div>
                <div style={{ fontSize: 20, fontWeight: 500 }}>{c.value}</div>
                <div style={{ fontSize: 11, color: "#888" }}>{c.note}</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
