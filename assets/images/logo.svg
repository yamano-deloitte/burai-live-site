<svg xmlns="http://www.w3.org/2000/svg" width="560" height="160" viewBox="0 0 560 160" role="img">
<title>Burai Live — Global Tech Solution</title>
<desc>Burai Live wordmark logo with geometric accent bar and gradient dot</desc>
<defs>
  <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#007acc"/>
    <stop offset="100%" stop-color="#00b4d8"/>
  </linearGradient>
  <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#00b4d8"/>
    <stop offset="100%" stop-color="#007acc"/>
  </linearGradient>
</defs>

<!-- 左アクセントバー -->
<rect x="0" y="18" width="5" height="90" rx="2.5" fill="url(#g3)"/>

<!-- 上段ボックスアクセント -->
<rect x="12" y="18" width="38" height="38" fill="none" stroke="#007acc" stroke-width="1" stroke-opacity="0.35" rx="4"/>

<!-- BURAI ワードマーク（濃紺） -->
<text x="10" y="88"
  font-family="'Helvetica Neue', Arial, sans-serif"
  font-size="72"
  font-weight="800"
  letter-spacing="-2"
  fill="#0b1f3a">BURAI</text>

<!-- I の上のアクセントドット -->
<circle cx="530" cy="26" r="8" fill="url(#g1)"/>

<!-- 区切り線 -->
<line x1="10" y1="100" x2="540" y2="100" stroke="#007acc" stroke-width="0.8" stroke-opacity="0.3"/>

<!-- LIVE + サブテキスト -->
<text x="10" y="124"
  font-family="'Helvetica Neue', Arial, sans-serif"
  font-size="16"
  font-weight="700"
  letter-spacing="5"
  fill="url(#g1)">LIVE</text>

<text x="68" y="124"
  font-family="'Helvetica Neue', Arial, sans-serif"
  font-size="16"
  font-weight="400"
  letter-spacing="3"
  fill="#8a9ab0">  GLOBAL TECH SOLUTION</text>

<!-- タグライン -->
<text x="10" y="148"
  font-family="'Helvetica Neue', Arial, sans-serif"
  font-size="10"
  font-weight="600"
  letter-spacing="2.5"
  fill="#b0bbc8">DX · ISR DRONE · AI · WEB · CLOUD</text>
</svg>
