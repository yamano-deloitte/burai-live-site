<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- 背景グラデーション -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050d1a"/>
      <stop offset="100%" stop-color="#0b2444"/>
    </linearGradient>
    <!-- アクセントグロー -->
    <radialGradient id="glow1" cx="80%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#007acc" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#007acc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="10%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#0b3d91" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0b3d91" stop-opacity="0"/>
    </radialGradient>
    <!-- グリッドパターン -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#007acc" stroke-width="0.5" stroke-opacity="0.12"/>
    </pattern>
    <!-- テキストグラデーション -->
    <linearGradient id="textgrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#007acc"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- 右側デコレーション：六角形グリッド風アクセント -->
  <rect x="820" y="80" width="340" height="2" rx="1" fill="#007acc" fill-opacity="0.4"/>
  <rect x="860" y="100" width="260" height="1" rx="0.5" fill="#007acc" fill-opacity="0.2"/>
  <rect x="820" y="460" width="340" height="2" rx="1" fill="#007acc" fill-opacity="0.4"/>
  <rect x="860" y="480" width="260" height="1" rx="0.5" fill="#007acc" fill-opacity="0.2"/>

  <!-- アクセント縦線 -->
  <rect x="80" y="80" width="4" height="470" rx="2" fill="url(#textgrad)"/>

  <!-- ロゴエリア -->
  <text x="108" y="148" font-family="'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="800" fill="#ffffff" letter-spacing="-1">Burai Live</text>

  <!-- eyebrow -->
  <rect x="108" y="172" width="220" height="28" rx="14" fill="#007acc" fill-opacity="0.2"/>
  <rect x="108" y="172" width="220" height="28" rx="14" fill="none" stroke="#007acc" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="128" cy="186" r="4" fill="#007acc"/>
  <text x="140" y="191" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="700" fill="#007acc" letter-spacing="1.5">JAPAN TECH PARTNER</text>

  <!-- メインコピー -->
  <text x="108" y="280" font-family="'Helvetica Neue', Arial, sans-serif" font-size="68" font-weight="800" fill="#ffffff" letter-spacing="-2">DX・ISRドローン</text>
  <text x="108" y="358" font-family="'Helvetica Neue', Arial, sans-serif" font-size="68" font-weight="800" letter-spacing="-2">
    <tspan fill="url(#textgrad)">AI</tspan>
    <tspan fill="#ffffff">で事業を変革する</tspan>
  </text>

  <!-- サブコピー -->
  <text x="108" y="415" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#ffffff" fill-opacity="0.55">ドローンシステム開発 · AI · Web · Cloud — 一気通貫で支援</text>

  <!-- サービスピル -->
  <g transform="translate(108, 450)">
    <rect x="0" y="0" width="130" height="36" rx="8" fill="#007acc" fill-opacity="0.15" stroke="#007acc" stroke-width="1" stroke-opacity="0.4"/>
    <text x="65" y="23" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#007acc" text-anchor="middle">ISR Drone</text>
  </g>
  <g transform="translate(252, 450)">
    <rect x="0" y="0" width="100" height="36" rx="8" fill="#007acc" fill-opacity="0.15" stroke="#007acc" stroke-width="1" stroke-opacity="0.4"/>
    <text x="50" y="23" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#007acc" text-anchor="middle">AI / ML</text>
  </g>
  <g transform="translate(366, 450)">
    <rect x="0" y="0" width="80" height="36" rx="8" fill="#007acc" fill-opacity="0.15" stroke="#007acc" stroke-width="1" stroke-opacity="0.4"/>
    <text x="40" y="23" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#007acc" text-anchor="middle">Web</text>
  </g>
  <g transform="translate(460, 450)">
    <rect x="0" y="0" width="90" height="36" rx="8" fill="#007acc" fill-opacity="0.15" stroke="#007acc" stroke-width="1" stroke-opacity="0.4"/>
    <text x="45" y="23" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#007acc" text-anchor="middle">Cloud</text>
  </g>

  <!-- URL -->
  <text x="108" y="570" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#ffffff" fill-opacity="0.35" letter-spacing="1">burai.live</text>

  <!-- 右側：ドローン風アイコン（シンプル幾何学） -->
  <g transform="translate(960, 315)" opacity="0.18">
    <!-- 中央ボディ -->
    <circle cx="0" cy="0" r="28" fill="none" stroke="#007acc" stroke-width="2"/>
    <circle cx="0" cy="0" r="10" fill="#007acc"/>
    <!-- アーム -->
    <line x1="0" y1="0" x2="90" y2="-90" stroke="#007acc" stroke-width="2"/>
    <line x1="0" y1="0" x2="-90" y2="-90" stroke="#007acc" stroke-width="2"/>
    <line x1="0" y1="0" x2="90" y2="90" stroke="#007acc" stroke-width="2"/>
    <line x1="0" y1="0" x2="-90" y2="90" stroke="#007acc" stroke-width="2"/>
    <!-- プロペラ -->
    <ellipse cx="90" cy="-90" rx="30" ry="8" fill="none" stroke="#007acc" stroke-width="1.5" transform="rotate(-45 90 -90)"/>
    <ellipse cx="-90" cy="-90" rx="30" ry="8" fill="none" stroke="#007acc" stroke-width="1.5" transform="rotate(45 -90 -90)"/>
    <ellipse cx="90" cy="90" rx="30" ry="8" fill="none" stroke="#007acc" stroke-width="1.5" transform="rotate(45 90 90)"/>
    <ellipse cx="-90" cy="90" rx="30" ry="8" fill="none" stroke="#007acc" stroke-width="1.5" transform="rotate(-45 -90 90)"/>
    <!-- モーターハブ -->
    <circle cx="90" cy="-90" r="8" fill="#007acc" fill-opacity="0.6"/>
    <circle cx="-90" cy="-90" r="8" fill="#007acc" fill-opacity="0.6"/>
    <circle cx="90" cy="90" r="8" fill="#007acc" fill-opacity="0.6"/>
    <circle cx="-90" cy="90" r="8" fill="#007acc" fill-opacity="0.6"/>
  </g>
</svg>
