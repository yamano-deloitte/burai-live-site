name: Auto Push and Merge to Main

on:
  schedule:
    - cron: '0 0 * * *' # 毎日午前9時(JST)に実行（UTC0時）
  workflow_dispatch:

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: demo

      - name: Set up Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Fetch main branch
        run: git fetch origin main:main

      - name: Merge demo into main
        run: |
          git checkout main
          if git merge --no-ff demo -m "Auto-merge demo into main"; then
            echo "Merge successful"
          else
            echo "::error::Merge conflict detected between demo and main"
            exit 1
          fi

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Auto-merge failed: Conflicts between demo and main',
              body: 'The automated merge from demo to main failed due to conflicts. Please resolve manually.'
            });

      - name: Push changes
        run: git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
