<div id="maintenance-modal" class="maintenance-modal" role="dialog" aria-labelledby="maintenance-title" aria-modal="true">
  <div class="maintenance-modal__overlay"></div>
  <div class="maintenance-modal__panel">
    <button class="maintenance-modal__close" type="button" aria-label="Close">&times;</button>
    <h2 id="maintenance-title">🚧 Under Maintenance</h2>
    <div class="maintenance-modal__body">
      <p>The English version of this site is currently under construction.</p>
      <p>We apologize for the inconvenience. Please check back soon or visit the Japanese version.</p>
      <div class="maintenance-actions">
        <a href="{{ '/' | relative_url }}" class="btn">View Japanese Site</a>
        <button type="button" class="btn btn-secondary" onclick="closeMaintenanceModal()">Continue Anyway</button>
      </div>
    </div>
  </div>
</div>

<script>
function closeMaintenanceModal() {
  const modal = document.getElementById('maintenance-modal');
  if (modal) {
    modal.style.display = 'none';
    sessionStorage.setItem('maintenanceModalClosed', 'true');
  }
}

// Show modal on page load for English pages
document.addEventListener('DOMContentLoaded', function() {
  const isEnglishPage = window.location.pathname.includes('/en/');
  const modalClosed = sessionStorage.getItem('maintenanceModalClosed');
  
  if (isEnglishPage && !modalClosed) {
    const modal = document.getElementById('maintenance-modal');
    if (modal) {
      modal.style.display = 'block';
    }
  }
});

// Close on overlay click
document.addEventListener('click', function(e) {
  if (e.target.classList.contains('maintenance-modal__overlay')) {
    closeMaintenanceModal();
  }
});

// Close on close button click
document.addEventListener('click', function(e) {
  if (e.target.classList.contains('maintenance-modal__close')) {
    closeMaintenanceModal();
  }
});

// Close on Escape key
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeMaintenanceModal();
  }
});
</script>
