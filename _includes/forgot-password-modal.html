<!-- パスワードリセット用モーダル -->
<div id="forgot-password-modal" class="modal" style="display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; overflow:auto; background:rgba(0,0,0,0.5);">
  <div class="modal-content" style="background:#fff; margin:10% auto; padding:20px; border-radius:8px; max-width:350px; position:relative;">
    <span class="close" onclick="document.getElementById('forgot-password-modal').style.display='none'" style="position:absolute; top:10px; right:15px; font-size:24px; cursor:pointer;">&times;</span>
    <h2 style="margin-top:0;">パスワード再設定</h2>
    <form id="forgot-password-form" style="display:flex; flex-direction:column; gap:15px;">
      <label for="forgot-email">登録メールアドレス:</label>
      <input type="email" id="forgot-email" name="forgot-email" required style="padding:8px; border:1px solid #ddd; border-radius:4px;">
      <button type="submit" style="padding:10px; background:#0b3d91; color:#fff; border:none; border-radius:4px; cursor:pointer;">リセットリンク送信</button>
    </form>
    <div id="forgot-password-message" style="margin-top:10px; color:#0b3d91;"></div>
  </div>
</div>
<script>
// モーダル表示関数
function openForgotPasswordModal() {
  document.getElementById('forgot-password-modal').style.display = 'block';
}
</script>
