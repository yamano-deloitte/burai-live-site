<a class="skip-link" href="#main-content">Skip to content</a>
<header class="site-header" role="banner">
  <div class="container header-inner">
    <div class="brand">
      <a class="brand-link" href="{{ '/' | relative_url }}">
        {% if site.logo %}
          <img src="{{ site.logo | relative_url }}" alt="{{ site.title }}" class="brand-logo" />
        {% else %}
          <strong class="site-title">{{ site.title }}</strong>
        {% endif %}
      </a>
      <p class="tag">{{ site.description }}</p>
    </div>

    <button class="nav-toggle" aria-controls="main-nav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>

    <nav id="main-nav" class="main-nav" role="navigation">
      {% if site.navigation %}
        {% for item in site.navigation %}
          <a href="{{ item.url | relative_url }}">{{ item.title }}</a>
        {% endfor %}
      {% else %}
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
        <a href="#contact">Contact</a>
      {% endif %}
    </nav>
  </div>
</header>

<script src="{{ '/assets/js/header.js' | relative_url }}" defer></script>
