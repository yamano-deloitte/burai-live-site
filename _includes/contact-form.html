<form id="contact-form" class="contact-form" action="https://formspree.io/f/mwpzzkdk" method="POST" novalidate>
  <input type="hidden" name="_subject" value="New contact submission from website">

  <div class="form-row">
    <label for="cf-name">Name</label>
    <input id="cf-name" name="name" type="text" required>
  </div>

  <div class="form-row">
    <label for="cf-email">Email</label>
    <input id="cf-email" name="email" type="email" required>
  </div>

  <div class="form-row">
    <label for="cf-message">Message</label>
    <textarea id="cf-message" name="message" rows="6" required></textarea>
  </div>

  <!-- Simple honeypot to reduce spam -->
  <div style="display:none;">
    <label>Leave this field empty</label>
    <input name="_gotcha" tabindex="-1" autocomplete="off">
  </div>

  <div class="form-row form-checkbox">
    <label class="checkbox-label">
      <input id="cf-privacy" name="privacy-consent" type="checkbox" required>
      <span class="checkbox-text">
        I agree to the <a href="/privacy-policy/" target="_blank" rel="noopener">Privacy Policy</a> and consent to the processing of my personal information.
        / <a href="/privacy-policy/" target="_blank" rel="noopener">プライバシーポリシー</a>に同意し、個人情報の取り扱いに同意します。
      </span>
    </label>
  </div>

  <div class="form-row">
    <button type="submit">Send</button>
  </div>

  <!-- <p class="form-note">Replace the `action` URL with your Formspree endpoint or other form backend.</p> -->
</form>
